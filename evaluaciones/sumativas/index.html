<section class="contact-form">
  <h2>Preinscripción a Talleres Comunitarios</h2>
  <form id="registroForm" method="POST">
    <div class="form-group">
      <label for="nombres">Nombres:</label>
      <input type="text" id="nombres" name="nombres" required>
    </div>

    <div class="form-group">
      <label for="apellidos">Apellidos:</label>
      <input type="text" id="apellidos" name="apellidos" required>
    </div>

    <div class="form-group">
      <label for="rut">RUT:</label>
      <input type="text" id="rut" name="rut" placeholder="12345678-9" required>
    </div>

    <div class="form-group">
      <label for="fechaNacimiento">Fecha de Nacimiento:</label>
      <input type="text" id="fechaNacimiento" name="fechaNacimiento" placeholder="dd/mm/aaaa" required>
    </div>

    <div class="form-group">
      <label for="workshop-interest">Taller de Interés:</label>
      <select id="workshop-interest" name="workshop-interest" required>
        <option value="">Selecciona un taller</option>
        <option value="teatro">Teatro Comunitario</option>
        <option value="danza">Danza Urbana Contemporánea</option>
        <option value="musica">Música y Creación de Beats</option>
      </select>
    </div>

    <div class="form-group">
      <label for="email">Correo Electrónico:</label>
      <input type="text" id="email" name="email" placeholder="ejemplo@dominio.cl" required>
    </div>

    <div class="form-group">
      <label for="observaciones">Observaciones:</label>
      <textarea id="observaciones" name="observaciones" placeholder="Opcional..."></textarea>
    </div>

    <button type="submit">Registrar</button>
    <div id="mensajeError"></div>
  </form>
</section>
